; ================================================
; IGI EDITOR CONFIGURATION
; ================================================

[GamePath]
; The root directory of your Project IGI installation.
IGIPath=IGI_GAME_PATH
Level=1
EditorPath=.
QEditorPath=C:\Users\USERNAME\AppData\Roaming\QEditor

[Paths]
AIFiles=C:\Users\USERNAME\AppData\Roaming\QEditor\AIFiles
QCompiler=C:\Users\USERNAME\AppData\Roaming\QEditor\QCompiler
QFiles=C:\Users\USERNAME\AppData\Roaming\QEditor\QFiles
QGraphs=C:\Users\USERNAME\AppData\Roaming\QEditor\QGraphs

[Marker]
; ------------------------------------------------
; IGI 2 Editor-style object manipulation bindings
; ------------------------------------------------

; Base manipulation
Manipulate=LeftMouseButton

; Position manipulation
ManipulatePositionXY=Shift
ManipulatePositionXZ=Ctrl
ManipulatePositionXZAlt=Shift+Ctrl

; Snap functions
ManipulatePositionSnapToGround=S
ManipulatePositionSnapToObject=O

; Orientation manipulation
ManipulateOrientationAlpha=A
ManipulateOrientationBeta=B
ManipulateOrientationGamma=G
ManipulateOrientationReset=Space

; Utility Shortcuts
TeleportToMarker=F11
ResetMarkerToPlayer=H

; Movement Keys (Arrow keys for camera movement)
MoveForward=Up
MoveBackward=Down
MoveLeft=Left
MoveRight=Right

[UI]
; Font and UI settings
FontSize=10.0
FontColorR=255
FontColorG=255
FontColorB=255

[Keybindings]
; Global shortcuts (work anytime)
; Format: Modifier+Key (e.g., CTRL+S, SHIFT+R, CTRL+SHIFT+D)
; Available modifiers: CTRL, SHIFT, ALT
Save=CTRL+S
ResetLevel=CTRL+R
Debug=CTRL+D
Quit=CTRL+Q
Help=H

; Pause menu only shortcuts
ResetScript=SHIFT+R
