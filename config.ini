; ================================================
; PROJECT IGI TERRAIN EDITOR CONFIGURATION
; ================================================

[GamePath]
; The root directory of your Project IGI installation.
; Example: IGIPath=C:\Games\Project IGI
IGIPath=D:\IGI1

; The level number to load on startup (1-14).
Level=1

; Path to the editor's data resources (usually current directory '.')
EditorPath=.

; Path to the QEditor AppData folder (where IGIModels.json and QCompiler are located).
; Example: QEditorPath=C:\Users\YourName\AppData\Roaming\QEditor
QEditorPath=C:\Users\hasee\AppData\Roaming\QEditor

[Paths]
; Granular paths for QEditor components (derived from QEditorPath by default)
AIFiles=C:\Users\hasee\AppData\Roaming\QEditor\AIFiles
QCompiler=C:\Users\hasee\AppData\Roaming\QEditor\QCompiler
QFiles=C:\Users\hasee\AppData\Roaming\QEditor\QFiles
QGraphs=C:\Users\hasee\AppData\Roaming\QEditor\QGraphs

[Marker]
; ------------------------------------------------
; Object Manipulation Key Bindings
; (Use capital letters for single keys)
; ------------------------------------------------

; Marker Movement (World Space)
MoveForward=I
MoveBackward=K
MoveLeft=J
MoveRight=L
MoveUp=U
MoveDown=O

; Marker Rotation (Radians)
RotateYawCCW=[
RotateYawCW=]
RotatePitchUp=;
RotatePitchDown='
RotateRollLeft=.
RotateRollRight=/

; Utility Shortcuts
; TeleportToMarker: Moles camera to object
TeleportToMarker=M
; ResetMarkerToPlayer: Brings object to current camera position
ResetMarkerToPlayer=H
